name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun test

      - name: Run Python SDK tests
        run: PYTHONPATH=sdks/python/src python3 -m unittest discover -s sdks/python/tests

      - name: Run Gradle tests and bundle the Bukkit runtime
        run: ./gradlew test :runtimes:jvm:bukkit:shadowJar --no-daemon

      - name: Build Astro docs
        run: bun run build:docs

      - name: Upload Bukkit runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: lapis-runtime-bukkit
          path: runtimes/jvm/bukkit/build/libs/lapis-runtime-bukkit.jar
          if-no-files-found: error

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Astro docs to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bun run deploy:docs
